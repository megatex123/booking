name: Build & Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: megatex123
  REPO: booking

jobs:
  build-backend:
    name: Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/${{ env.REPO }}/backend:latest
            ghcr.io/${{ env.OWNER }}/${{ env.REPO }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    name: Web App
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push web app
        uses: docker/build-push-action@v5
        with:
          context: ./mobile
          file: ./mobile/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/${{ env.REPO }}/web:latest
            ghcr.io/${{ env.OWNER }}/${{ env.REPO }}/web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-pitch:
    name: Pitch Deck
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push pitch deck
        uses: docker/build-push-action@v5
        with:
          context: ./pitch-serve
          file: ./pitch-serve/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/${{ env.REPO }}/pitch:latest
            ghcr.io/${{ env.OWNER }}/${{ env.REPO }}/pitch:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
