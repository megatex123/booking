<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Generator — percubaan.com</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a14;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #141430;
      border: 1px solid #1e1e3a;
      border-radius: 1.25rem;
      padding: 2rem;
      width: 100%;
      max-width: 440px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 0.375rem;
    }

    h1 span { color: #6366f1; }

    .sub {
      text-align: center;
      color: #64748b;
      font-size: 0.8125rem;
      margin-bottom: 1.75rem;
    }

    textarea {
      width: 100%;
      background: #0d0d24;
      border: 1px solid #1e1e3a;
      border-radius: 0.75rem;
      color: #e2e8f0;
      font-size: 0.9375rem;
      padding: 0.875rem 1rem;
      resize: vertical;
      min-height: 90px;
      outline: none;
      transition: border-color 0.15s;
    }

    textarea:focus { border-color: #6366f1; }
    textarea::placeholder { color: #475569; }

    button {
      width: 100%;
      margin-top: 0.75rem;
      padding: 0.875rem;
      border-radius: 0.75rem;
      border: none;
      background: #6366f1;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover:not(:disabled) { background: #4f46e5; }
    button:disabled { background: #1e1e3a; color: #64748b; cursor: not-allowed; }

    .qr-box {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid #1e1e3a;
    }

    .qr-box img {
      width: 200px;
      height: 200px;
      border-radius: 0.75rem;
    }

    .dl-btn {
      width: auto;
      padding: 0.625rem 1.5rem;
      font-size: 0.875rem;
      background: #0d0d24;
      border: 1px solid #1e1e3a;
      color: #e2e8f0;
      margin-top: 0;
    }

    .dl-btn:hover { background: #1e1e3a; }

    .error {
      color: #ef4444;
      font-size: 0.8125rem;
      text-align: center;
      margin-top: 0.625rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>QR <span>Generator</span></h1>
    <p class="sub">percubaan.com — Jana kod QR dengan satu klik</p>

    <textarea id="input" placeholder="Taip URL atau teks di sini…" rows="3"></textarea>
    <button id="genBtn" onclick="generate()">Jana Kod QR</button>
    <p class="error" id="err"></p>

    <div class="qr-box" id="qrBox">
      <img id="qrImg" src="" alt="QR Code" />
      <button class="dl-btn" onclick="download()">⬇ Muat Turun PNG</button>
    </div>
  </div>

  <script>
    let lastBlob = null;

    async function generate() {
      const text = document.getElementById('input').value.trim();
      const err  = document.getElementById('err');
      const btn  = document.getElementById('genBtn');
      err.textContent = '';

      if (!text) { err.textContent = 'Sila masukkan teks atau URL.'; return; }

      btn.disabled = true;
      btn.textContent = 'Menjana…';

      try {
        const res = await fetch('/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });

        if (!res.ok) {
          const j = await res.json();
          throw new Error(j.error || 'Ralat pelayan');
        }

        const blob = await res.blob();
        lastBlob = blob;
        const url = URL.createObjectURL(blob);
        const img = document.getElementById('qrImg');
        img.src = url;
        document.getElementById('qrBox').style.display = 'flex';
      } catch (e) {
        err.textContent = e.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Jana Kod QR';
      }
    }

    function download() {
      if (!lastBlob) return;
      const a = document.createElement('a');
      a.href = URL.createObjectURL(lastBlob);
      a.download = 'qrcode.png';
      a.click();
    }

    document.getElementById('input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); generate(); }
    });
  </script>
</body>
</html>
